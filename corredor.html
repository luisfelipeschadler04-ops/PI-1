<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./estilos/global-style.css" />
  <link rel="stylesheet" href="./estilos/corredor-style.css" />
  <title>Laços do Apego - Corredor</title>
</head>
<body>
  <main class="corredor-container">
    <header class="corredor-header">
      <h1 class="corredor-title">Corredor do Conhecimento</h1>
    </header>

    <div class="paineis-grid">
      <!-- Sala 1 — sempre desbloqueada -->
      <div class="painel seguro" id="painel-1" data-sala="1" data-url="./sala-1-apego-seguro.html">
        <div class="painel-numero">1</div>
        <div class="painel-nome">Apego Seguro</div>
        <div class="painel-icone">💚</div>
        <div class="painel-status" id="status-1"></div>
      </div>

      <!-- Sala 2 -->
      <div class="painel evitativo" id="painel-2" data-sala="2" data-url="./sala-2-apego-evitativo.html">
        <div class="painel-numero">2</div>
        <div class="painel-nome">Apego Evitativo</div>
        <div class="painel-icone" id="icone-2">🔒</div>
        <div class="painel-status" id="status-2"></div>
      </div>

      <!-- Sala 3 -->
      <div class="painel ambivalente" id="painel-3" data-sala="3" data-url="./sala-3-apego-ambivalente.html">
        <div class="painel-numero">3</div>
        <div class="painel-nome">Apego Ambivalente</div>
        <div class="painel-icone" id="icone-3">🔒</div>
        <div class="painel-status" id="status-3"></div>
      </div>

      <!-- Sala 4 -->
      <div class="painel desorganizado" id="painel-4" data-sala="4" data-url="./sala-4-apego-desorganizado.html">
        <div class="painel-numero">4</div>
        <div class="painel-nome">Apego Desorganizado</div>
        <div class="painel-icone" id="icone-4">🔒</div>
        <div class="painel-status" id="status-4"></div>
      </div>
    </div>

    <footer class="corredor-footer">
      <p class="footer-text">Clique em uma sala para entrar</p>
    </footer>
  </main>

  <!-- Modal: Sala Bloqueada -->
  <div id="modal-bloqueado" class="corredor-modal hidden">
    <div class="corredor-modal-content">
      <p class="corredor-modal-texto">Esta sala ainda está trancada. Complete a sala anterior para encontrar a chave.</p>
      <button class="btn-primario" onclick="fecharModalCorredor()">Entendido</button>
    </div>
  </div>

  <!-- Modal: Revisitar Sala -->
  <div id="modal-revisitar" class="corredor-modal hidden">
    <div class="corredor-modal-content">
      <p class="corredor-modal-texto">Você já passou por aqui. Quer revisar o que aprendeu?</p>
      <div class="corredor-modal-btns">
        <button class="btn-primario" id="btn-revisitar-sim">Sim, revisitar</button>
        <button class="btn-secundario" onclick="fecharModalCorredor()">Não</button>
      </div>
    </div>
  </div>

  <script src="./js/game-state.js"></script>
  <script src="./js/corredor-logic.js"></script>
</body>
</html>
